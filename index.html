<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>City Metro Map</title>

  <link rel="stylesheet" href="leaflet.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    .leaflet-container {
      background: black !important;
    }

    #map {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <script src="leaflet.js"></script>

  <script>
    // Your image (MetroMap.png)
    const img = new Image();
    img.src = "MetroMap.png";

    img.onload = () => {
      const imageWidth = img.width;
      const imageHeight = img.height;

      const bounds = [[0, 0], [imageHeight, imageWidth]];

      const map = L.map('map', {
        crs: L.CRS.Simple,
        zoomControl: true,
        maxBounds: bounds,
        zoomSnap: 0.1,
        inertia: true
      });

      L.imageOverlay("MetroMap.png", bounds).addTo(map);

      // Fit properly for ANY screen size
      map.fitBounds(bounds);

      // Auto-resize fix (mobile rotation + desktop resize)
      function resize() {
        map.invalidateSize();
        map.fitBounds(bounds);
      }

      window.addEventListener("resize", resize);
      window.addEventListener("orientationchange", resize);
    };
  </script>
</body>
</html>
