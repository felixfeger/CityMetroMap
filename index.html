<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>City Metro Map</title>

  <link rel="stylesheet" href="leaflet.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
      touch-action: none; /* improves mobile dragging */
    }

    .leaflet-container {
      background: black !important;
    }

    #map {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }

    /* Mobile-friendly button */
    #fullscreenBtn {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1000;
      padding: 10px 12px;
      border: none;
      border-radius: 8px;
      background: white;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <button id="fullscreenBtn">Fullscreen</button>
  <div id="map"></div>

  <script src="leaflet.js"></script>

  <script>
    const imageWidth = 4640;
    const imageHeight = 2580;
    const bounds = [[0, 0], [imageHeight, imageWidth]];

    const map = L.map('map', {
      crs: L.CRS.Simple,
      zoomControl: true,
      maxBounds: bounds,
      inertia: true,          // smoother mobile dragging
      scrollWheelZoom: true
    });

    L.imageOverlay(
      'MetroMap.png',
      bounds
    ).addTo(map);

    map.fitBounds(bounds);

    // FIX: always resize properly on mobile + desktop
    function resizeMap() {
      map.invalidateSize();
      map.fitBounds(bounds);
    }

    window.addEventListener('resize', resizeMap);
    window.addEventListener('orientationchange', resizeMap);

    // FIXED FULLSCREEN (works on iPhone, Android, desktop)
    document.getElementById("fullscreenBtn").addEventListener("click", () => {
      const el = document.documentElement;

      if (!document.fullscreenElement) {
        if (el.requestFullscreen) {
          el.requestFullscreen();
        } else if (el.webkitRequestFullscreen) {
          el.webkitRequestFullscreen(); // iOS Safari fallback
        }
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        }
      }

      // Leaflet must re-render after fullscreen change
      setTimeout(resizeMap, 300);
    });

  </script>
</body>
</html>
