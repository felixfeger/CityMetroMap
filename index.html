<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>City Metro Map</title>

  <link rel="stylesheet" href="leaflet.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #map {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }

    /* optional fullscreen button */
    #fullscreenBtn {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1000;
      padding: 8px 12px;
      border: none;
      background: white;
      cursor: pointer;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
  </style>
</head>

<body>
  <button id="fullscreenBtn">Fullscreen</button>
  <div id="map"></div>

  <script src="leaflet.js"></script>

  <script>
    // Image size (your updated 16:9 map)
    const imageWidth = 4640;
    const imageHeight = 2580;

    const bounds = [[0, 0], [imageHeight, imageWidth]];

    const map = L.map('map', {
      crs: L.CRS.Simple,
      minZoom: -2,
      maxZoom: 4,
      zoomControl: true,
      maxBounds: bounds
    });

    // Add map image
    L.imageOverlay(
      'MetroMap.png',
      bounds
    ).addTo(map);

    // Fit map to image
    map.fitBounds(bounds);

    // Fix rendering on load/resizes
    window.addEventListener('resize', () => {
      map.invalidateSize();
      map.fitBounds(bounds);
    });

    // Fullscreen button (browser fullscreen)
    document.getElementById("fullscreenBtn").onclick = () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    };
  </script>
</body>
</html>
